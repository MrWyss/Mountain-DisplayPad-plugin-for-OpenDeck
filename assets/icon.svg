<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d3d3d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="50%" stop-color="#222"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="btnShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Device body (trapezoid-ish shape, angled perspective) -->
  <path d="M56,160 L456,160 Q470,160 470,174 L470,380 Q470,400 450,410 L62,410 Q42,400 42,380 L42,174 Q42,160 56,160 Z"
        fill="url(#bodyGrad)" filter="url(#shadow)" stroke="#555" stroke-width="1"/>

  <!-- Brushed metal texture lines -->
  <g opacity="0.08" stroke="#fff" stroke-width="0.5">
    <line x1="50" y1="180" x2="462" y2="180"/>
    <line x1="50" y1="200" x2="462" y2="200"/>
    <line x1="50" y1="220" x2="462" y2="220"/>
    <line x1="50" y1="240" x2="462" y2="240"/>
    <line x1="50" y1="260" x2="462" y2="260"/>
    <line x1="50" y1="280" x2="462" y2="280"/>
    <line x1="50" y1="300" x2="462" y2="300"/>
    <line x1="50" y1="320" x2="462" y2="320"/>
    <line x1="50" y1="340" x2="462" y2="340"/>
    <line x1="50" y1="360" x2="462" y2="360"/>
    <line x1="50" y1="380" x2="462" y2="380"/>
    <line x1="50" y1="400" x2="462" y2="400"/>
  </g>

  <!-- USB cable -->
  <rect x="242" y="120" width="28" height="50" rx="6" fill="#333" stroke="#444" stroke-width="1"/>
  <rect x="248" y="80" width="16" height="50" rx="4" fill="#222" stroke="#3a3a3a" stroke-width="1"/>

  <!-- Button display area (recessed panel) -->
  <rect x="68" y="190" width="376" height="196" rx="8" fill="#0a0a0a" stroke="#333" stroke-width="1"/>

  <!-- 6x2 button grid -->
  <!-- Row 1 -->
  <rect x="82" y="204" width="50" height="50" rx="6" fill="url(#btnGrad)" filter="url(#btnShadow)" stroke="#444" stroke-width="0.5"/>
  <rect x="143" y="204" width="50" height="50" rx="6" fill="url(#btnGrad)" filter="url(#btnShadow)" stroke="#444" stroke-width="0.5"/>
  <rect x="204" y="204" width="50" height="50" rx="6" fill="url(#btnGrad)" filter="url(#btnShadow)" stroke="#444" stroke-width="0.5"/>
  <rect x="265" y="204" width="50" height="50" rx="6" fill="url(#btnGrad)" filter="url(#btnShadow)" stroke="#444" stroke-width="0.5"/>
  <rect x="326" y="204" width="50" height="50" rx="6" fill="url(#btnGrad)" filter="url(#btnShadow)" stroke="#444" stroke-width="0.5"/>
  <rect x="387" y="204" width="50" height="50" rx="6" fill="url(#btnGrad)" filter="url(#btnShadow)" stroke="#444" stroke-width="0.5"/>

  <!-- Row 2 -->
  <rect x="82" y="268" width="50" height="50" rx="6" fill="url(#btnGrad)" filter="url(#btnShadow)" stroke="#444" stroke-width="0.5"/>
  <rect x="143" y="268" width="50" height="50" rx="6" fill="url(#btnGrad)" filter="url(#btnShadow)" stroke="#444" stroke-width="0.5"/>
  <rect x="204" y="268" width="50" height="50" rx="6" fill="url(#btnGrad)" filter="url(#btnShadow)" stroke="#444" stroke-width="0.5"/>
  <rect x="265" y="268" width="50" height="50" rx="6" fill="url(#btnGrad)" filter="url(#btnShadow)" stroke="#444" stroke-width="0.5"/>
  <rect x="326" y="268" width="50" height="50" rx="6" fill="url(#btnGrad)" filter="url(#btnShadow)" stroke="#444" stroke-width="0.5"/>
  <rect x="387" y="268" width="50" height="50" rx="6" fill="url(#btnGrad)" filter="url(#btnShadow)" stroke="#444" stroke-width="0.5"/>

  <!-- Colorful display glows on some buttons to show they're active -->
  <!-- Button 1,1 - blue accent -->
  <rect x="86" y="208" width="42" height="42" rx="4" fill="#1a3a5c" opacity="0.9"/>
  <rect x="90" y="212" width="34" height="34" rx="2" fill="none" stroke="#4a9eff" stroke-width="1" opacity="0.4"/>

  <!-- Button 1,4 - green accent -->
  <rect x="269" y="208" width="42" height="42" rx="4" fill="#1a4a2a" opacity="0.9"/>
  <rect x="273" y="212" width="34" height="34" rx="2" fill="none" stroke="#4aff7a" stroke-width="1" opacity="0.4"/>

  <!-- Button 2,2 - purple accent -->
  <rect x="147" y="272" width="42" height="42" rx="4" fill="#3a1a5c" opacity="0.9"/>
  <rect x="151" y="276" width="34" height="34" rx="2" fill="none" stroke="#aa4aff" stroke-width="1" opacity="0.4"/>

  <!-- Button 2,5 - orange accent -->
  <rect x="330" y="272" width="42" height="42" rx="4" fill="#5c3a1a" opacity="0.9"/>
  <rect x="334" y="276" width="34" height="34" rx="2" fill="none" stroke="#ff9a4a" stroke-width="1" opacity="0.4"/>

  <!-- Mountain logo hint (bottom center) -->
  <path d="M244,370 L256,354 L268,370 Z" fill="#555" opacity="0.6"/>

  <!-- "DISPLAYPAD" text label -->
  <text x="256" y="438" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold"
        fill="#666" text-anchor="middle" letter-spacing="4">DISPLAYPAD</text>
</svg>
